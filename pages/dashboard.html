<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="../css/login.css" />
    <style>
        .user-list {
            list-style: none;
            padding: 0;
        }
        .user-list li {
            border-bottom: 1px solid #000;
            padding: 0.8rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .user-info {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
            font-size: 14px;
        }
        .user-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .rol-badge {
            border: 1px solid #000;
            padding: 0.15rem 0.5rem;
            font-size: 0.8rem;
            background: #eaeaea;
        }
        .btn-small {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            background: #fff;
            border: 1.5px solid #000;
            cursor: pointer;
        }
        .btn-small:hover {
            background: #000;
            color: #fff;
        }
        .btn-danger {
            border-color: #ff0000;
            color: #ff0000;
        }
        .btn-danger:hover {
            background: #ff0000;
            color: #fff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .user-count {
            border: 1px solid #000;
            padding: 0.3rem 0.8rem;
            background: #f0f0f0;
        }
        .logout-btn {
            border-color: #000;
        }
        .logout-btn:hover {
            background: #000;
            color: #fff;
        }
        .btn-index {
            border-color: #0066cc;
            color: #0066cc;
        }
        .btn-index:hover {
            background: #0066cc;
            color: #fff;
        }
        .mensaje {
            margin: 1rem 0;
        }
        select.btn-small {
            background: #fff;
            cursor: pointer;
        }
        .form-group {
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: bold;
        }
        .form-group input {
            padding: 0.5rem;
            border: 1px solid #000;
            max-width: 300px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
        }
        .btn {
            background: #fff;
            border: 2px solid #000;
            padding: 0.5rem 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn:hover {
            background: #000;
            color: #fff;
        }
        .hidden {
            display: none !important;
        }
        .user-actions .btn-small {
            font-size: 11px;
            padding: 0.2rem 0.6rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👑 Panel de Administración</h1>
        <div class="header-actions">
            <button class="btn btn-index" id="btnIrIndex">🏠 Ir al Inicio</button>
            <span class="user-count" id="userCount">0 usuarios</span>
            <button class="btn logout-btn" id="btnCerrarSesion">Cerrar Sesión</button>
        </div>
    </div>
    
    <p>Gestión de usuarios del sistema.</p>
    
    <div id="dashboardMensaje" class="mensaje hidden"></div>
    
    <h2>Lista de Usuarios</h2>
    <ul class="user-list" id="listaUsuarios">
        <li>Cargando usuarios...</li>
    </ul>
    
    <hr />
    
    <div class="form-group">
        <label for="buscarUsuario">Buscar por RUT</label>
        <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="buscarUsuario" placeholder="Ej: 12345678-9" />
            <button class="btn btn-small" id="btnBuscar">Buscar</button>
        </div>
    </div>
</div>

<script>
    // Botón para redirigir al index.html (que está fuera de la carpeta pages)
    document.getElementById('btnIrIndex').addEventListener('click', function() {
        window.location.href = '../index.html';
    });
</script>

<script src="../js/github.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
