<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turismo San Fernando · Lobby</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fff;
    color:#000;
}

header{
    background:#000;
    color:#fff;
    text-align:center;
    padding:30px;
    position: relative;
}

header .user-badge {
    position: absolute;
    top: 15px;
    right: 20px;
    background: #fff;
    color: #000;
    padding: 6px 14px;
    border: 1px solid #000;
    font-size: 0.85rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

header .user-badge .rol {
    background: #333;
    color: #fff;
    padding: 2px 10px;
    font-size: 0.7rem;
    text-transform: uppercase;
}

nav{
    background:#333;
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    flex-wrap:wrap;
}

nav button{
    padding:10px 20px;
    border:1px solid #000;
    background:#fff;
    color:#000;
    cursor:pointer;
    font-weight: bold;
}

nav button:hover{
    background:#ddd;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h2{
    margin-bottom:20px;
}

.hero p{
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

.hero button{
    margin-top:25px;
    padding:12px 25px;
    background:#000;
    color:#fff;
    border:1px solid #000;
    cursor:pointer;
}

.lugares{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:40px;
}

.tarjeta{
    width:280px;
    border:1px solid #000;
    padding:20px;
    text-align:center;
    background:#f5f5f5;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.tarjeta h3{
    margin-bottom:15px;
}

.tarjeta p{
    margin-bottom:20px;
    flex-grow: 1;
}

.tarjeta button{
    padding:10px 20px;
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
}

footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:40px;
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
}

footer .btn-cerrar {
    background: #fff;
    color: #000;
    border: 1px solid #fff;
    padding: 5px 15px;
    cursor: pointer;
    font-weight: bold;
}

footer .btn-cerrar:hover {
    background: #ddd;
}

.mensaje-vacio {
    width: 100%;
    text-align: center;
    padding: 40px;
    border: 1px solid #000;
    background: #fafafa;
}
</style>

</head>
<body>

<header>
    <h1>Turismo San Fernando</h1>
    <p>Descubre la capital de la Provincia de Colchagua</p>
    <div class="user-badge" id="userBadge">
        <span id="userNombre">Cargando...</span>
        <span class="rol" id="userRol">-</span>
    </div>
</header>

<nav id="navBotones">
    <!-- Los botones se generan con JavaScript según el rol -->
</nav>

<section class="hero">
    <h2>Bienvenido a San Fernando</h2>
    <p>
        San Fernando es una ciudad ubicada en la Región de O'Higgins, reconocida
        por su patrimonio, sus viñas, su historia y los atractivos naturales que
        la rodean.
    </p>
    <button onclick="sonido()">Comenzar recorrido</button>
</section>

<section class="lugares" id="contenedorSalidas">
    <!-- Se llena dinámicamente con las salidas guardadas -->
</section>

<footer>
    © 2026 Turismo San Fernando
    <button class="btn-cerrar" id="btnCerrarSesion">Cerrar sesión</button>
</footer>

<script src="js/github.js"></script>
<script src="js/auth.js"></script>
<script src="js/planificacion.js"></script>
<script>
    // Función de sonido original (se conserva)
    function sonido(){
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = "triangle";
        osc.frequency.value = 700;
        osc.connect(gain);
        gain.connect(audio.destination);
        gain.gain.setValueAtTime(0.15, audio.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.15);
        osc.start();
        osc.stop(audio.currentTime + 0.15);
    }

    (function() {
        // ===== VERIFICAR SESIÓN =====
        const usuario = Auth.getSesion();
        if (!usuario) {
            window.location.href = 'login.html';
            return;
        }

        // Mostrar datos del usuario en el badge
        document.getElementById('userNombre').textContent = `${usuario.nombre} ${usuario.apellido || ''}`;
        document.getElementById('userRol').textContent = usuario.rol;

        // ===== GENERAR BOTONES DEL NAV =====
        const nav = document.getElementById('navBotones');
        let botones = [];

        switch (usuario.rol) {
            case 'admin':
                botones.push({
                    texto: '👑 Panel de Administración',
                    href: 'pages/dashboard.html'
                });
                botones.push({
                    texto: '📋 Planificar Salida',
                    href: 'Planificar_Salida_Pedagogica.html'
                });
                botones.push({
                    texto: '📅 Calendario',
                    onclick: 'alert("Calendario (próximamente)")'
                });
                break;

            case 'guia':
                botones.push({
                    texto: '📋 Planificar Salida',
                    href: 'Planificar_Salida_Pedagogica.html'
                });
                botones.push({
                    texto: '📅 Calendario',
                    onclick: 'alert("Calendario (próximamente)")'
                });
                break;

            case 'estudiante':
            default:
                botones.push({
                    texto: '📅 Calendario',
                    onclick: 'alert("Calendario (próximamente)")'
                });
                botones.push({
                    texto: '🎒 Mis Salidas',
                    onclick: 'alert("Lista de mis salidas (próximamente)")'
                });
                break;
        }

        // Renderizar botones en el nav
        botones.forEach(b => {
            const btn = document.createElement('button');
            btn.textContent = b.texto;
            if (b.href) {
                btn.onclick = function() { window.location.href = b.href; };
            } else if (b.onclick) {
                btn.onclick = new Function(b.onclick);
            }
            nav.appendChild(btn);
        });

        // ===== CARGAR Y MOSTRAR SALIDAS =====
        async function cargarYMostrarSalidas() {
            const contenedor = document.getElementById('contenedorSalidas');
            try {
                const salidas = await Planificacion.cargarSalidas();
                if (!salidas || salidas.length === 0) {
                    contenedor.innerHTML = `
                        <div class="mensaje-vacio">
                            <p>📭 No hay salidas planificadas para este mes/semana.</p>
                            <p style="margin-top:10px; font-size:0.9rem;">
                                ${usuario.rol === 'admin' || usuario.rol === 'guia' 
                                    ? 'Puedes crear una desde "Planificar Salida".' 
                                    : 'Vuelve más tarde.'}
                            </p>
                        </div>
                    `;
                    return;
                }

                // Mostrar hasta 3 salidas
                const mostradas = salidas.slice(0, 3);
                contenedor.innerHTML = mostradas.map(s => `
                    <div class="tarjeta">
                        <h3>${s.titulo}</h3>
                        <p>${s.descripcion || 'Sin descripción'}</p>
                        <p><small>📅 ${s.fecha || 'Fecha no definida'}</small></p>
                        <p><small>👤 ${s.guia || 'Sin guía'}</small></p>
                        <button onclick="alert('Detalles de: ${s.titulo.replace(/'/g, "\\'")}')">Ver más</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error al cargar salidas:', error);
                contenedor.innerHTML = `<div class="mensaje-vacio"><p>⚠️ Error al cargar las salidas.</p></div>`;
            }
        }

        cargarYMostrarSalidas();

        // ===== CERRAR SESIÓN =====
        document.getElementById('btnCerrarSesion').addEventListener('click', function() {
            Auth.cerrarSesion();
        });
    })();
</script>
</body>
</html>
