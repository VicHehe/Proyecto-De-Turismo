<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión de Salidas</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: white;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            max-width: 400px;
            width: 100%;
            border: 2px solid #000;
            padding: 2rem;
            background: #fff;
        }
        h1 {
            border-bottom: 2px solid #000;
            padding-bottom: 0.5rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .field input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #000;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .tab-btns {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.5rem;
            border: 2px solid #000;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #000;
            color: #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 0.7rem;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:hover {
            background: #333;
        }
        .msg {
            margin-top: 1rem;
            padding: 0.5rem;
            border: 1px solid #000;
            display: none;
        }
        .msg.error {
            display: block;
            background: #ffebeb;
        }
        .msg.success {
            display: block;
            background: #ebffeb;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>🔐 Sistema de Gestión</h1>
    <p>Salidas y Excursiones</p>

    <div class="tab-btns">
        <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" onclick="switchTab('registro')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="panelLogin">
        <div class="field">
            <label>RUT (con guión)</label>
            <input type="text" id="loginRut" placeholder="Ej: 12345678-9">
        </div>
        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="loginPass" placeholder="********">
        </div>
        <button class="btn-submit" onclick="login()">Iniciar sesión</button>
        <div class="msg" id="loginMsg"></div>
    </div>

    <!-- REGISTRO -->
    <div id="panelRegistro" class="hidden">
        <div class="field">
            <label>RUT (con guión)</label>
            <input type="text" id="regRut" placeholder="Ej: 12345678-9">
        </div>
        <div class="field">
            <label>Nombre completo</label>
            <input type="text" id="regNombre" placeholder="Tu nombre completo">
        </div>
        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="regPass" placeholder="********">
        </div>
        <div class="field">
            <label>Confirmar contraseña</label>
            <input type="password" id="regPass2" placeholder="********">
        </div>
        <button class="btn-submit" onclick="registro()">Crear cuenta</button>
        <div class="msg" id="registroMsg"></div>
    </div>
</div>

<script src="js/github.js"></script>
<script src="js/auth.js"></script>
<script>
    // Si ya hay sesión, redirigir al index
    if (Auth.getSesion()) window.location.href = 'index.html';

    function switchTab(tab) {
        const esLogin = tab === 'login';
        document.getElementById('panelLogin').style.display = esLogin ? '' : 'none';
        document.getElementById('panelRegistro').style.display = esLogin ? 'none' : '';
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', esLogin ? i === 0 : i === 1);
        });
    }

    function mostrarMsg(id, texto, tipo) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = `msg ${tipo}`;
    }

    async function login() {
        const rut = document.getElementById('loginRut').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!rut || !pass) return mostrarMsg('loginMsg', 'Completá todos los campos', 'error');

        const res = await Auth.login(rut, pass);
        if (!res.ok) return mostrarMsg('loginMsg', res.error, 'error');

        // Redirigir según rol
        if (res.rol === 'admin') {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'index.html';
        }
    }

    async function registro() {
        const rut = document.getElementById('regRut').value.trim();
        const nombre = document.getElementById('regNombre').value.trim();
        const pass = document.getElementById('regPass').value;
        const pass2 = document.getElementById('regPass2').value;

        if (!rut || !nombre || !pass || !pass2)
            return mostrarMsg('registroMsg', 'Completá todos los campos', 'error');
        if (pass !== pass2)
            return mostrarMsg('registroMsg', 'Las contraseñas no coinciden', 'error');
        if (pass.length < 6)
            return mostrarMsg('registroMsg', 'La contraseña debe tener al menos 6 caracteres', 'error');

        const res = await Auth.registro(rut, nombre, pass);
        if (!res.ok) return mostrarMsg('registroMsg', res.error, 'error');

        mostrarMsg('registroMsg', '✅ Cuenta creada. Iniciá sesión.', 'success');
        setTimeout(() => switchTab('login'), 1500);
    }

    // Enter para enviar
    document.getElementById('loginPass').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
    document.getElementById('regPass2').addEventListener('keydown', e => {
        if (e.key === 'Enter') registro();
    });
</script>
</body>
</html>
