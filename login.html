<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión de Salidas</title>
    <style>
        /* Estilos básicos en blanco y negro */
        body {
            font-family: system-ui, sans-serif;
            background: white;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            max-width: 500px;
            width: 100%;
            border: 2px solid #000;
            padding: 2rem;
            background: #fff;
        }
        h1 {
            border-bottom: 2px solid #000;
            padding-bottom: 0.5rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .field input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #000;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .tab-btns {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.5rem;
            border: 2px solid #000;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #000;
            color: #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 0.7rem;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .msg {
            margin-top: 1rem;
            padding: 0.5rem;
            border: 1px solid #000;
            display: none;
        }
        .msg.error {
            display: block;
            background: #ffebeb;
        }
        .msg.success {
            display: block;
            background: #ebffeb;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .field {
            flex: 1;
        }
        .rol-info {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        .panel-hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>🔐 Sistema de Gestión</h1>
    <p>Salidas y Excursiones</p>

    <div class="tab-btns">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" id="tabRegistro" onclick="switchTab('registro')">Registrarse</button>
    </div>

    <!-- PANEL LOGIN -->
    <div id="panelLogin">
        <div class="field">
            <label>RUT (con guión)</label>
            <input type="text" id="loginRut" placeholder="Ej: 12345678-9" value="22785939-3">
        </div>
        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="loginPass" placeholder="********" value="Devictor.">
        </div>
        <button class="btn-submit" id="btnLogin" onclick="login()">Iniciar sesión</button>
        <div class="msg" id="loginMsg"></div>
    </div>

    <!-- PANEL REGISTRO -->
    <div id="panelRegistro" style="display:none;">
        <div class="form-row">
            <div class="field">
                <label>Nombre</label>
                <input type="text" id="regNombre" placeholder="Tu nombre">
            </div>
            <div class="field">
                <label>Apellido</label>
                <input type="text" id="regApellido" placeholder="Tu apellido">
            </div>
        </div>
        <div class="form-row">
            <div class="field">
                <label>Edad</label>
                <input type="number" id="regEdad" placeholder="18">
            </div>
            <div class="field">
                <label>RUT (con guión)</label>
                <input type="text" id="regRut" placeholder="Ej: 12345678-9">
            </div>
        </div>
        <div class="form-row">
            <div class="field">
                <label>Teléfono</label>
                <input type="text" id="regTelefono" placeholder="912345678">
            </div>
            <div class="field">
                <label>Gmail</label>
                <input type="email" id="regGmail" placeholder="ejemplo@gmail.com">
            </div>
        </div>
        <div class="field">
            <label>Historial médico</label>
            <input type="text" id="regHistorial" placeholder="Alergias, condiciones, etc.">
        </div>
        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="regPass" placeholder="********">
        </div>
        <div class="field">
            <label>Confirmar contraseña</label>
            <input type="password" id="regPass2" placeholder="********">
        </div>
        <div class="rol-info">⚠️ Si tu RUT está autorizado, obtendrás ese rol. Si no, serás Visitante.</div>
        <button class="btn-submit" id="btnRegistro" onclick="registro()">Crear cuenta</button>
        <div class="msg" id="registroMsg"></div>
    </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="js/github.js"></script>
<script src="js/auth.js"></script>

<script>
    // ============================================================
    // CÓDIGO DE LOGIN Y REGISTRO
    // ============================================================

    // Verificar si Auth está definido
    if (typeof Auth === 'undefined') {
        document.body.innerHTML = '<h1>Error: Auth no está definido</h1><p>Revisa que auth.js se haya cargado correctamente.</p>';
        console.error('❌ Auth no está definido');
    } else {
        console.log('✅ Auth cargado correctamente');
    }

    // Función para cambiar entre pestañas
    function switchTab(tab) {
        const esLogin = tab === 'login';
        document.getElementById('panelLogin').style.display = esLogin ? 'block' : 'none';
        document.getElementById('panelRegistro').style.display = esLogin ? 'none' : 'block';
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', esLogin ? i === 0 : i === 1);
        });
        // Limpiar mensajes
        document.getElementById('loginMsg').className = 'msg';
        document.getElementById('loginMsg').style.display = 'none';
        document.getElementById('registroMsg').className = 'msg';
        document.getElementById('registroMsg').style.display = 'none';
    }

    function mostrarMsg(id, texto, tipo) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = `msg ${tipo}`;
        el.style.display = 'block';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.textContent = loading ? 'Cargando...' : btnId === 'btnLogin' ? 'Iniciar sesión' : 'Crear cuenta';
    }

    // ===== LOGIN =====
    async function login() {
        const rut = document.getElementById('loginRut').value.trim();
        const pass = document.getElementById('loginPass').value;
        
        if (!rut || !pass) {
            return mostrarMsg('loginMsg', 'Completá todos los campos', 'error');
        }

        if (typeof Auth === 'undefined') {
            return mostrarMsg('loginMsg', 'Error: Auth no está definido', 'error');
        }

        setLoading('btnLogin', true);
        try {
            const res = await Auth.login(rut, pass);
            setLoading('btnLogin', false);
            if (!res.ok) {
                return mostrarMsg('loginMsg', res.error, 'error');
            }
            // Si llega aquí, la redirección ya la maneja Auth.login
        } catch (error) {
            setLoading('btnLogin', false);
            mostrarMsg('loginMsg', 'Error: ' + error.message, 'error');
        }
    }

    // ===== REGISTRO =====
    async function registro() {
        const nombre = document.getElementById('regNombre').value.trim();
        const apellido = document.getElementById('regApellido').value.trim();
        const edad = document.getElementById('regEdad').value.trim();
        const rut = document.getElementById('regRut').value.trim();
        const telefono = document.getElementById('regTelefono').value.trim();
        const gmail = document.getElementById('regGmail').value.trim();
        const historial = document.getElementById('regHistorial').value.trim();
        const pass = document.getElementById('regPass').value;
        const pass2 = document.getElementById('regPass2').value;

        if (!nombre || !apellido || !edad || !rut || !telefono || !gmail || !historial || !pass || !pass2) {
            return mostrarMsg('registroMsg', 'Todos los campos son obligatorios', 'error');
        }
        if (pass !== pass2) {
            return mostrarMsg('registroMsg', 'Las contraseñas no coinciden', 'error');
        }
        if (pass.length < 6) {
            return mostrarMsg('registroMsg', 'La contraseña debe tener al menos 6 caracteres', 'error');
        }
        if (isNaN(edad) || parseInt(edad) < 1) {
            return mostrarMsg('registroMsg', 'Edad inválida', 'error');
        }

        if (typeof Auth === 'undefined') {
            return mostrarMsg('registroMsg', 'Error: Auth no está definido', 'error');
        }

        setLoading('btnRegistro', true);
        try {
            const res = await Auth.registro(rut, nombre, apellido, edad, telefono, gmail, historial, pass);
            setLoading('btnRegistro', false);
            if (!res.ok) {
                return mostrarMsg('registroMsg', res.error, 'error');
            }

            const mensajeRol = res.rol === 'visitante' 
                ? '✅ Cuenta creada como Visitante. Un administrador puede cambiar tu rol.' 
                : `✅ Cuenta creada como ${res.rol.toUpperCase()}`;
            
            mostrarMsg('registroMsg', mensajeRol, 'success');
            document.querySelectorAll('#panelRegistro input').forEach(input => input.value = '');
            
            setTimeout(() => {
                switchTab('login');
                mostrarMsg('loginMsg', '✅ Registro exitoso. Inicia sesión.', 'success');
            }, 2000);
        } catch (error) {
            setLoading('btnRegistro', false);
            mostrarMsg('registroMsg', 'Error: ' + error.message, 'error');
        }
    }

    // ===== EVENTOS =====
    document.getElementById('loginPass').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
    document.getElementById('regPass2').addEventListener('keydown', e => {
        if (e.key === 'Enter') registro();
    });

    console.log('✅ login.html cargado correctamente');
</script>
</body>
</html>
